<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J&M Security</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="container">
    <h1><span class="red">J</span><span class="blue">&</span><span class="red">M</span></h1>
    <h2 class="security">Security</h2>
    <p class="tagline">نحمي السيرفرات... ونحمي قلوبنا</p>
    
    <div class="buttons">
      <a href="https://wa.me/201127927372" class="btn" target="_blank">تواصل معانا</a>
      <a href="#" class="btn" onclick="activateProtection()">ابدأ الحماية</a>
    </div>
    
    <p id="protection-text" class="protection"></p>
    <p class="footer">محمد بيحب جميل ∞</p>
  </div>

  <script>
    function activateProtection() {
      const text = document.getElementById('protection-text');
      text.innerHTML = '🛡️ تم تفعيل الحماية بنجاح 🛡️<br>J&M Security ∞<br>جميل ❤️ محمد';
      text.style.display = 'block';
      text.style.animation = 'glow 1s infinite alternate';
    }

    // كود النجوم
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let stars = [];
    for(let i = 0; i < 150; i++){
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.5
      });
    }
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ffff';
      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
        star.y += star.speed;
        if(star.y > canvas.height) star.y = 0;
      });
      requestAnimationFrame(animate);
    }
    animate();
    
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
